<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios Lógica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="contenedor">
        <header class="header">
            <h1>Ejercicios de lógica</h1>
            <p>Practica lógica de programación con JavaScript y Python.</p>
        </header>

        <section id="lista-ejercicios" class="lista-ejercicios"></section>

        <section class="resultado">
            <h2 id="titulo-ejercicio">Selecciona un ejercicio</h2>
            <p id="descripcion-ejercicio"></p>

            <div class="codigo-container">
                <div class="bloque-codigo">
                    <h3>JavaScript</h3>
                    <pre id="codigo-js"></pre>
                </div>

                <div class="bloque-codigo">
                    <h3>Python</h3>
                    <pre id="codigo-python"></pre>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
